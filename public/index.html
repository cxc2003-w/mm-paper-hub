<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MM Paper Hub</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <nav class="top-nav">
      <div class="container nav-inner">
        <div class="brand">
          <span class="brand-dot"></span>
          <strong>MM Paper Hub</strong>
        </div>
        <div class="nav-actions">
          <button id="theme-toggle" type="button" class="ghost-btn">切换主题</button>
          <a class="ghost-btn nav-link" href="https://arxiv.org/" target="_blank" rel="noreferrer">arXiv</a>
        </div>
      </div>
    </nav>
    <header class="container hero">
      <div class="hero-badge">Real arXiv Feed</div>
      <h1>MM Paper Hub</h1>
      <p>多模态论文发现、筛选与收藏，一站式工作台</p>
      <div id="quick-tags" class="quick-tags"></div>
    </header>

    <main class="container">
      <section class="panel">
        <form id="search-form">
          <input id="query" type="text" placeholder="输入关键词，例如：vision language model" />
          <button type="submit">搜索</button>
        </form>
        <div class="filters">
          <label>
            每页数量
            <select id="page-size">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="30">30</option>
              <option value="50">50</option>
            </select>
          </label>
          <label>
            排序
            <select id="sort-mode">
              <option value="date_desc" selected>最新优先</option>
              <option value="date_asc">最早优先</option>
              <option value="title_asc">标题 A-Z</option>
            </select>
          </label>
          <label>
            年份
            <input id="year-filter" type="number" placeholder="如 2025" min="1990" max="2099" />
          </label>
          <label>
            作者
            <input id="author-filter" type="text" placeholder="作者名关键词" />
          </label>
        </div>
        <div class="meta-row">
          <div class="meta-left">
            <span id="status">准备就绪</span>
            <span id="total-badge" class="result-badge"></span>
            <span id="last-updated" class="result-badge ghost">未更新</span>
          </div>
          <div class="meta-actions">
            <button id="refresh-favorites" type="button" class="ghost-btn">刷新收藏</button>
            <button id="export-favorites" type="button" class="ghost-btn">导出收藏 JSON</button>
          </div>
        </div>
        <div class="live-row">
          <label class="switch-row">
            <input id="auto-refresh" type="checkbox" />
            <span>自动刷新</span>
          </label>
          <label class="switch-row">
            <input id="sse-live" type="checkbox" checked />
            <span>实时模式</span>
          </label>
          <label>
            间隔
            <select id="refresh-interval">
              <option value="30">30 秒</option>
              <option value="60" selected>60 秒</option>
              <option value="120">120 秒</option>
            </select>
          </label>
          <span id="live-tip" class="muted">关闭（手动搜索）</span>
          <span id="sse-status" class="result-badge ghost">实时: 关闭</span>
        </div>
        <div id="active-filters" class="active-filters"></div>
      </section>

      <section class="stats-grid">
        <article class="stat-card">
          <p class="stat-label">当前页结果</p>
          <p id="stat-page-count" class="stat-value">0</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">收藏数量</p>
          <p id="stat-fav-count" class="stat-value">0</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">当前关键词</p>
          <p id="stat-query" class="stat-value stat-small">-</p>
        </article>
      </section>

      <section class="grid">
        <div class="panel">
          <h2>搜索结果</h2>
          <p id="empty-tips" class="muted hidden">没有结果，试试更具体关键词，如 "multimodal agent planning"</p>
          <div id="results" class="list card-grid"></div>
          <div class="pagination">
            <button id="prev-page" type="button" class="ghost-btn">上一页</button>
            <span id="page-indicator" class="muted">第 1 页</span>
            <button id="next-page" type="button" class="ghost-btn">下一页</button>
          </div>
        </div>
        <div class="panel">
          <h2>我的收藏</h2>
          <div id="favorites" class="list"></div>
        </div>
      </section>
    </main>

    <template id="paper-card">
      <article class="card">
        <h3 class="title"></h3>
        <p class="sub"></p>
        <p class="summary"></p>
        <div class="actions">
          <a class="pdf" target="_blank" rel="noreferrer">PDF</a>
          <a class="abs" target="_blank" rel="noreferrer">ArXiv</a>
          <button class="save">收藏</button>
          <button class="remove danger hidden">移除</button>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
  </html>
